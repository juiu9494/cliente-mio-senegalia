<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu IN&OUT Senigallia</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1a1a1a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Poppins', sans-serif;
            color: white;
            padding: 20px;
        }
        .menu-full {
            max-width: 100%;
            max-height: 90vh;
            box-shadow: 0 10px 40px rgba(0,0,0,0.7);
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .menu-full img {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 8px;
        }
        .back-link {
            display: inline-block;
            background: #8b5a2b;
            color: white;
            padding: 12px 30px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: 600;
            transition: background 0.3s;
        }
        .back-link:hover { background: #c17f59; }
    </style>
</head>
<body>
    <div class="menu-full">
        <img src="menu_inout.jpeg" alt="Menu IN&OUT Senigallia">
    </div>
    <a href="home.html" class="back-link">← Torna al sito</a>
</body>
</html>
